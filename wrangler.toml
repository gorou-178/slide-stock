name = "slide-stock"
compatibility_date = "2025-02-14"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Pages の Wrangler 設定。
# `pages_build_output_dir` を指定することで本ファイルが Pages デプロイで参照される
# ようになり、`[vars]` と `[[d1_databases]]` が本番に適用される。
# これを忘れると Wrangler は wrangler.toml を「Ignoring configuration file for now」
# として完全に無視するため、`env.GOOGLE_CLIENT_ID` 等が undefined になる
# （詳細: CHANGELOG 0.0.7.1 / docs/auth-spec.md §9 / ADR-008）。
pages_build_output_dir = "./dist"

# --- 環境変数（本番 Pages にも反映される） ---
[vars]
CALLBACK_URL = "https://slide-stock.gorou.dev/api/auth/callback"
# SESSION_MAX_AGE = "604800"  — セッション有効期間（秒）、省略時 604800（7日）

# --- Secrets（wrangler.toml には書けない。Pages 用に別途設定する） ---
# 本番セットアップは下記コマンドで（プロジェクト名はダッシュボードで確認）:
#   wrangler pages secret put GOOGLE_CLIENT_ID --project-name=slide-stock
#   wrangler pages secret put GOOGLE_CLIENT_SECRET --project-name=slide-stock
#   wrangler pages secret put SESSION_SECRET --project-name=slide-stock
# 詳細は docs/auth-spec.md §9 を参照。

# --- D1 データベース ---
[[d1_databases]]
binding = "DB"
database_name = "slide-stock-db"
database_id = "44ece48f-84d2-4a02-8df4-470f3b2b6e23"
