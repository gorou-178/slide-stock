name = "slide-stock-api"
main = "worker/index.ts"
compatibility_date = "2025-02-14"

# --- ルーティング ---
# gorou.dev が Cloudflare ゾーンでないため Worker routes は使用不可。
# 代わりに Pages の _redirects で /api/* を workers.dev へプロキシする。

# --- 環境変数 ---
[vars]
CALLBACK_URL = "https://slide-stock.gorou.dev/api/auth/callback"

# --- Secrets（wrangler secret put で設定） ---
# GOOGLE_CLIENT_ID     — Google OAuth Client ID
# GOOGLE_CLIENT_SECRET — Google OAuth Client Secret
# SESSION_SECRET       — セッション Cookie 署名キー（openssl rand -hex 32）

# --- D1 データベース ---
[[d1_databases]]
binding = "DB"
database_name = "slide-stock-db"
database_id = "44ece48f-84d2-4a02-8df4-470f3b2b6e23"

# --- Queue ---
# oEmbed メタデータ取得用 Queue（oembed-spec.md セクション 5.4）
[[queues.producers]]
queue = "oembed-fetch"
binding = "OEMBED_QUEUE"

[[queues.consumers]]
queue = "oembed-fetch"
max_batch_size = 2
max_batch_timeout = 3
max_retries = 3
dead_letter_queue = "oembed-fetch-dlq"
